<!doctype html>
<html>
  <head>
    <title>Bulk Order Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <h1>Bulk Procurement Dashboard</h1>

    <div>
      <h3>Total Orders: <span id="totalOrders"></span></h3>
      <h3>Total Revenue: ₹ <span id="totalRevenue"></span></h3>
      <h3>Average Order Value: ₹ <span id="avgOrder"></span></h3>
    </div>

    <canvas id="monthlyChart" width="400" height="200"></canvas>
    <canvas id="topProductsChart" width="400" height="200"></canvas>
    <canvas id="vendorRevenueChart" width="400" height="200"></canvas>
    <canvas id="orderTrendChart" width="400" height="200"></canvas>

    <script>
      async function loadDashboard() {
        const analytics = await fetch("/analytics/").then((res) => res.json());
        document.getElementById("totalOrders").innerText =
          analytics.total_orders;
        document.getElementById("totalRevenue").innerText =
          analytics.total_revenue;
        document.getElementById("avgOrder").innerText =
          analytics.average_order_value;

        const monthly = await fetch("/analytics/monthly").then((res) =>
          res.json(),
        );
        const topProducts = await fetch("/analytics/top-products").then((res) =>
          res.json(),
        );
        const vendorRevenue = await fetch("/analytics/vendor-revenue").then(
          (res) => res.json(),
        );
        const orderTrend = await fetch("/analytics/order-trend").then((res) =>
          res.json(),
        );

        new Chart(document.getElementById("monthlyChart"), {
          type: "bar",
          data: {
            labels: monthly.map((m) => m.month),
            datasets: [
              {
                label: "Monthly Spending",
                data: monthly.map((m) => m.total),
              },
            ],
          },
        });

        new Chart(document.getElementById("topProductsChart"), {
          type: "bar",
          data: {
            labels: topProducts.map((p) => "Product " + p.product_id),
            datasets: [
              {
                label: "Top Products",
                data: topProducts.map((p) => p.total_quantity),
              },
            ],
          },
        });

        new Chart(document.getElementById("vendorRevenueChart"), {
          type: "pie",
          data: {
            labels: vendorRevenue.map((v) => "Vendor " + v.vendor_id),
            datasets: [
              {
                label: "Vendor Revenue",
                data: vendorRevenue.map((v) => v.revenue),
              },
            ],
          },
        });

        new Chart(document.getElementById("orderTrendChart"), {
          type: "line",
          data: {
            labels: orderTrend.map((o) => o.date),
            datasets: [
              {
                label: "Orders Over Time",
                data: orderTrend.map((o) => o.orders),
              },
            ],
          },
        });
      }

      loadDashboard();
    </script>
  </body>
</html>
